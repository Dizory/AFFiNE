[package]
name = "affine-tauri"
version = "0.22.4"
description = "AFFiNE Desktop Application"
authors = ["toeverything"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "2.0", features = [] }

[dependencies]
tauri = { version = "2.0", features = [
    "protocol-asset",
    "macos-private-api",
    "linux-ipc-protocol",
    "devtools",
    "unstable"
] }
tauri-plugin-updater = "2.0"
tauri-plugin-dialog = "2.0"
tauri-plugin-fs = "2.0"
tauri-plugin-clipboard-manager = "2.0"
tauri-plugin-shell = "2.0"
tauri-plugin-notification = "2.0"
tauri-plugin-window-state = "2.0"
tauri-plugin-deep-link = "2.0"
tauri-plugin-single-instance = "2.0"
tauri-plugin-http = "2.0"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1.45", features = ["full"] }
anyhow = "1"
log = "0.4"
env_logger = "0.11"
parking_lot = "0.12"
once_cell = "1"
async-trait = "0.1"
thiserror = "2"
lazy_static = "1.5"

# AFFiNE native modules
affine_common = { path = "../../../../common/native" }
affine_nbstore = { path = "../../../native/nbstore" }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "z"
strip = true
